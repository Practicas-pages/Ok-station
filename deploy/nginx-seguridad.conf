# ============================================================
# OK.station — Seguridad, HTTPS y rendimiento (Nginx / CloudPanel)
# Pega estas directivas en el "Vhost" del sitio en CloudPanel
# (dentro del bloque server { } que sirve HTTPS).
# CloudPanel ya emite y renueva el certificado SSL (Let's Encrypt).
# ============================================================

# ── Forzar HTTPS (redirección 301 desde HTTP) ──
# CloudPanel suele crear este bloque automáticamente. Si no:
#   server { listen 80; server_name okstation.mx www.okstation.mx;
#            return 301 https://$host$request_uri; }

# ── Headers de seguridad ──
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;  # HSTS (2 años)
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;

# ── Content-Security-Policy ──
# 'unsafe-inline' en script-src es solo por los JSON-LD inline; puedes
# endurecerla con hashes/nonce si lo deseas. frame-src permite el mapa.
add_header Content-Security-Policy "default-src 'self'; \
  script-src 'self' 'unsafe-inline'; \
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
  font-src https://fonts.gstatic.com; \
  img-src 'self' data: https:; \
  connect-src 'self'; \
  frame-src https://www.google.com https://maps.google.com; \
  base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

# ── Compresión (gzip; activa Brotli si el módulo está disponible) ──
gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml application/xml;
# brotli on; brotli_comp_level 5; brotli_types text/css application/javascript application/json image/svg+xml;

# ── Caché de estáticos (inmutables con hash; aquí cache larga) ──
location ~* \.(css|js|woff2?|ttf|svg|png|jpe?g|webp|avif|ico)$ {
  expires 30d;
  add_header Cache-Control "public, max-age=2592000, immutable";
  access_log off;
}

# HTML sin caché agresiva (para ver cambios al instante)
location ~* \.html$ {
  add_header Cache-Control "public, max-age=0, must-revalidate";
}

# ── Proteger archivos sensibles ──
location ~ /\.(env|git) { deny all; return 404; }
location ~* /backend/api/config\.php$ { deny all; return 404; }
location ~* /(serve\.ps1|launch\.json)$ { deny all; return 404; }

# ── Asegurar que Nginx pase el header Authorization al PHP (JWT) ──
# (en el bloque location ~ \.php$ { ... fastcgi_pass ...; })
#   fastcgi_param HTTP_AUTHORIZATION $http_authorization;
