# ============================================================
# OK.station — Vhost para un SITIO PHP de CloudPanel (NO WordPress)
# ------------------------------------------------------------
# Úsalo en un sitio nuevo (p. ej. v2.okstation.mx) creado como
# "PHP Site" en CloudPanel. NO lo mezcles con el sitio WordPress
# (ese usa Varnish y rompería). CloudPanel rellena los {{...}}.
# Pega esto en: Sites → (tu sitio PHP) → Vhost.
# ============================================================
server {
  listen 80;
  listen [::]:80;
  listen 443 quic;
  listen 443 ssl;
  listen [::]:443 quic;
  listen [::]:443 ssl;
  http2 on;
  http3 off;
  {{ssl_certificate_key}}
  {{ssl_certificate}}
  server_name v2.okstation.mx;          # ← ajusta al dominio/subdominio del sitio
  {{root}}

  {{nginx_access_log}}
  {{nginx_error_log}}

  # Forzar HTTPS
  if ($scheme != "https") {
    rewrite ^ https://$host$request_uri permanent;
  }

  # Let's Encrypt
  location ~ /.well-known {
    auth_basic off;
    allow all;
  }

  index index.html index.php;

  # ── Front estático (OK.station): sirve los .html directos ──
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── API PHP (OK.station) ──
  location ~ \.php$ {
    include fastcgi_params;
    fastcgi_intercept_errors on;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param HTTPS "on";
    # IMPRESCINDIBLE para el login con JWT (Nginx no pasa Authorization por defecto):
    fastcgi_param HTTP_AUTHORIZATION $http_authorization;
    try_files $uri =404;
    fastcgi_read_timeout 3600;
    fastcgi_pass 127.0.0.1:{{php_fpm_port}};
    fastcgi_param PHP_VALUE "{{php_settings}}";
  }

  # ── Seguridad: bloquear archivos/carpetas sensibles ──
  location ~ /\.(?:env|git) { deny all; return 404; }
  location ~* /backend/\.env$ { deny all; return 404; }
  location ~* /backend/api/config\.php$ { deny all; return 404; }
  location ~* /backend/storage/ { deny all; return 404; }
  location ~* /(?:serve\.ps1|\.gitignore)$ { deny all; return 404; }

  # ── Headers de seguridad ──
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-src https://www.google.com https://maps.google.com; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

  # ── Compresión ──
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml application/xml;

  # ── Caché de estáticos ──
  location ~* \.(css|js|woff2?|ttf|svg|png|jpe?g|webp|avif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
  }
}
